name: KrKr2Bindings
description: Bindings to the KrKr2 Engine C-API.
output: 'lib/src/ffi/krkr2_bindings.dart'
headers:
  entry-points:
    - '../backend/include/krkr2_api.h'
    - '../backend/include/krkr2_renderer.h'
  include-directives:
    - '**krkr2_api.h'
    - '**krkr2_renderer.h'
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
comments:
  style: any
  length: full
